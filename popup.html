<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  :root{ --bg:#150e1b; --surface:#211730; --line:rgba(255,255,255,.10); --text:#f7f0f6; --muted:#bcafc6; --faint:#867a92; --a1:#ff6f91; --a2:#ffa863; --accent:#ff7d94; --accent2:#ffa863; --go:#37e0ac; --warn:#ffc24d; --bad:#fb3d5b; --wait:#c774ff; --grad:linear-gradient(135deg,var(--a1),var(--a2)); }
  *{ box-sizing:border-box; margin:0; font-family:-apple-system,"SF Pro Text",Inter,system-ui,sans-serif; }
  body{ width:290px; background:var(--bg); color:var(--text); padding:15px; position:relative; overflow:hidden; }
  body::before{ content:""; position:absolute; inset:-45%; z-index:0; pointer-events:none; background:radial-gradient(38% 40% at 12% 6%, rgba(255,111,145,.28), transparent 60%), radial-gradient(36% 38% at 92% 4%, rgba(255,168,99,.22), transparent 60%), radial-gradient(40% 42% at 80% 100%, rgba(199,116,255,.20), transparent 62%); filter:blur(18px); animation:pop-aurora 20s ease-in-out infinite alternate; }
  @keyframes pop-aurora{ 0%{ transform:translate(-3%,-2%) scale(1) } 100%{ transform:translate(3%,3%) scale(1.08) } }
  body > *{ position:relative; z-index:1; }
  .hd{ display:flex; align-items:center; gap:10px; margin-bottom:14px; }
  .mark{ width:32px; height:32px; border-radius:10px; position:relative; display:flex; align-items:center; justify-content:center; overflow:hidden; background:linear-gradient(145deg,#ff6f91 0%,#ff8b7a 46%,#ffb066 100%); box-shadow:0 6px 16px rgba(255,111,145,.5), inset 0 1px 0 rgba(255,255,255,.6), inset 0 -5px 12px rgba(150,30,70,.3); animation:pop-glow 5s ease-in-out infinite; }
  .mark::before{ content:""; position:absolute; inset:0; border-radius:inherit; pointer-events:none; background:linear-gradient(180deg,rgba(255,255,255,.55) 0%,rgba(255,255,255,.12) 34%,rgba(255,255,255,0) 60%); }
  .mark svg{ position:relative; z-index:1; filter:drop-shadow(0 1.5px 1.5px rgba(130,25,70,.45)); }
  @keyframes pop-glow{ 0%,100%{ box-shadow:0 6px 16px rgba(255,111,145,.45), inset 0 1px 0 rgba(255,255,255,.6), inset 0 -5px 12px rgba(150,30,70,.3) } 50%{ box-shadow:0 8px 24px rgba(255,168,99,.55), inset 0 1px 0 rgba(255,255,255,.65), inset 0 -5px 12px rgba(150,30,70,.3) } }
  .t{ font-weight:750; font-size:14px; flex:1; letter-spacing:-.02em; background:var(--grad); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  .t small{ display:block; font-size:9.5px; color:var(--faint); font-weight:500; -webkit-text-fill-color:var(--faint); }
  .row{ display:flex; gap:8px; margin-bottom:10px; }
  .stat{ flex:1; border:1px solid var(--line); border-radius:12px; padding:9px 10px; background:rgba(255,255,255,.05); -webkit-backdrop-filter:blur(10px); backdrop-filter:blur(10px); box-shadow:inset 0 1px 0 rgba(255,255,255,.06); transition:transform .15s, border-color .15s; }
  .stat:hover{ transform:translateY(-2px); border-color:rgba(255,111,145,.32); }
  .stat .n{ font-size:19px; font-weight:700; } .stat .n small{ font-size:10px; color:var(--faint); }
  .stat .l{ font-size:8.5px; text-transform:uppercase; letter-spacing:.06em; color:var(--faint); margin-top:4px; font-weight:600; }
  .state{ display:flex; align-items:center; gap:8px; font-size:11.5px; color:var(--muted); margin:4px 0 12px; }
  .state .d{ width:7px;height:7px;border-radius:50%;background:var(--faint); }
  .state.running{ color:var(--go);} .state.running .d{ background:var(--go); animation:pop-pulse 1.7s infinite; }
  @keyframes pop-pulse{ 0%{ box-shadow:0 0 0 0 currentColor } 70%{ box-shadow:0 0 0 5px transparent } 100%{ box-shadow:0 0 0 0 transparent } }
  .state.paused,.state.done{ color:var(--warn);} .state.paused .d,.state.done .d{ background:var(--warn); }
  .state.halted{ color:var(--bad);} .state.halted .d{ background:var(--bad); }
  button{ width:100%; font-family:inherit; cursor:pointer; border-radius:10px; font-weight:650; font-size:12.5px; padding:11px; margin-bottom:8px; transition:transform .12s, box-shadow .18s, filter .18s, background .18s; }
  button:active{ transform:translateY(1px) scale(.99); }
  .primary{ background:var(--grad); color:#fff; border:none; box-shadow:0 5px 16px rgba(255,111,145,.4); }
  .primary:hover{ filter:brightness(1.09); box-shadow:0 7px 22px rgba(255,111,145,.55); }
  .ghost{ background:transparent; border:1px solid var(--line); color:var(--text); }
  .ghost:hover{ background:var(--surface); border-color:rgba(255,111,145,.28); }
  .warn{ font-size:10px; color:var(--faint); line-height:1.5; margin-top:6px; }
  @media(prefers-reduced-motion:reduce){ *,body::before{ animation:none!important; transition:none!important } }
</style>
</head>
<body>
  <div class="hd"><div class="mark"><svg viewBox="0 0 24 24" width="18" height="18" fill="none"><path d="M21.4 3 3.2 9.1 10.6 12.4Z" fill="#fff" stroke="#fff" stroke-width="1.1" stroke-linejoin="round"/><path d="M21.4 3 10.6 12.4 14 20.2Z" fill="#fff" fill-opacity=".68" stroke="#fff" stroke-opacity=".68" stroke-width="1.1" stroke-linejoin="round"/></svg></div><div class="t">OutreachOS<small>LinkedIn cadences</small></div></div>
  <div class="row">
    <div class="stat"><div class="n num" id="today">0<small>/50</small></div><div class="l">Today</div></div>
    <div class="stat"><div class="n num" id="active">0</div><div class="l">Active</div></div>
    <div class="stat"><div class="n num" id="wait">0</div><div class="l">Awaiting</div></div>
  </div>
  <div class="state" id="state"><span class="d"></span><span id="state-t">Idle</span></div>
  <button class="primary" id="dash">Open dashboard</button>
  <button class="ghost" id="li">Open LinkedIn</button>
  <div class="warn">Add prospects and run cadences from the on-page panel or the dashboard. Automating LinkedIn can restrict your account — use conservatively.</div>
  <script src="engine-core.js"></script>
  <script src="popup.js"></script>
</body>
</html>
